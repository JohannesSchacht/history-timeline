<main class="container">
  <h1>{{ title() }}</h1>

  @if (repo.loading()) {
    <p role="status">Lade Daten …</p>
  } @else if (repo.error()) {
    <p role="alert">{{ repo.error() }}</p>
  } @else {
    <app-timeline [events]="repo.events()" [viewport]="viewport()" (viewportChange)="viewport.set($event)" />
  }
</main>

<router-outlet />
