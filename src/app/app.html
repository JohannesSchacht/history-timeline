<main class="container">
  <h1>{{ title() }}</h1>

  @if (store.loading()) {
    <p role="status">Lade Daten …</p>
  } @else if (store.error()) {
    <p role="alert">{{ store.error() }}</p>
  } @else {
    <app-filter-panel />
    <app-timeline
      [events]="store.filteredEvents()"
      [viewport]="store.viewport()"
      [selectedId]="store.selectedEventId()"
      (viewportChange)="store.setViewport($event)"
      (eventSelected)="store.toggleEvent($event)"
    />
    <app-detail-panel />
  }
</main>

<router-outlet />
